spring.application.name=backend
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/ecommerce}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

jwt.secret=${JWT_SECRET:ChangeThisJwtSecretKeyForLocalDevelopment12345}
jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}

stripe.secretKey=${STRIPE_SECRET_KEY:}


payment.stripe.success-url=${STRIPE_SUCCESS_URL:https://example.com/api/payments/success?session_id={CHECKOUT_SESSION_ID}}
payment.stripe.cancel-url=${STRIPE_CANCEL_URL:https://example.com/api/payments/cancel}
